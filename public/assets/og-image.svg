<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c7d2fe"/>
    </linearGradient>
    <!-- Tag gradient -->
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#67e8f9"/>
    </linearGradient>
    <!-- Bar chart gradient -->
    <linearGradient id="barGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0.2"/>
    </linearGradient>
    <!-- Blob filters -->
    <filter id="blur1"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="blur2"><feGaussianBlur stdDeviation="50"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <circle cx="200" cy="150" r="280" fill="rgba(99,102,241,0.18)" filter="url(#blur1)"/>
  <circle cx="1050" cy="500" r="220" fill="rgba(34,211,238,0.15)" filter="url(#blur2)"/>
  <circle cx="620" cy="315" r="160" fill="rgba(99,102,241,0.07)" filter="url(#blur1)"/>

  <!-- ===== LEFT CONTENT ===== -->
  <!-- App Name -->
  <text x="60" y="168" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="92" fill="url(#titleGrad)" letter-spacing="-2">Flowllet</text>

  <!-- Tagline -->
  <text x="60" y="225" font-family="Arial, sans-serif" font-weight="700" font-size="34" fill="url(#tagGrad)">Smart Money. Beautiful Mind.</text>

  <!-- Description line 1 -->
  <text x="60" y="274" font-family="Arial, sans-serif" font-size="20" fill="#94a3b8">Track expenses, notes &amp; loans — offline &amp; private.</text>

  <!-- Description line 2 -->
  <text x="60" y="300" font-family="Arial, sans-serif" font-size="18" fill="#64748b">Phase 2 enhancements now live.</text>

  <!-- Badge 1: Multi-Currency -->
  <rect x="60" y="328" width="162" height="38" rx="19" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.5)" stroke-width="1.5"/>
  <text x="141" y="352" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#a5b4fc" text-anchor="middle">Multi-Currency</text>

  <!-- Badge 2: Offline First -->
  <rect x="234" y="328" width="140" height="38" rx="19" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.5)" stroke-width="1.5"/>
  <text x="304" y="352" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#a5b4fc" text-anchor="middle">Offline First</text>

  <!-- Badge 3: Privacy First -->
  <rect x="386" y="328" width="140" height="38" rx="19" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.5)" stroke-width="1.5"/>
  <text x="456" y="352" font-family="Arial, sans-serif" font-weight="700" font-size="15" fill="#a5b4fc" text-anchor="middle">Privacy First</text>

  <!-- Divided line -->
  <line x1="625" y1="60" x2="625" y2="570" stroke="rgba(255,255,255,0.07)" stroke-width="1" stroke-dasharray="8,6"/>

  <!-- Company credit bottom left -->
  <text x="60" y="580" font-family="Arial, sans-serif" font-size="16" fill="#475569">by Syscomatic Technologies Ltd.</text>

  <!-- ===== RIGHT CONTENT: Phone Mockup ===== -->
  <!-- Phone body -->
  <rect x="676" y="48" width="320" height="534" rx="36" fill="#1e293b" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- Notch -->
  <rect x="796" y="46" width="100" height="26" rx="14" fill="#0f172a"/>

  <!-- === Screen Content === -->
  <!-- Balance label -->
  <text x="712" y="126" font-family="Arial, sans-serif" font-size="13" fill="#64748b">Total Balance</text>

  <!-- Balance value -->
  <text x="712" y="168" font-family="'Arial Black', Arial, sans-serif" font-weight="900" font-size="38" fill="#ffffff">$12,540.00</text>

  <!-- Separator -->
  <line x1="712" y1="188" x2="964" y2="188" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Chart label -->
  <text x="712" y="210" font-family="Arial, sans-serif" font-size="11" fill="#475569">Weekly spending</text>

  <!-- Bar chart bars (7 bars) -->
  <!-- Bar 1 - 40% -->
  <rect x="712" y="262" width="26" height="36" rx="5" fill="url(#barGrad1)" opacity="0.6"/>
  <!-- Bar 2 - 65% -->
  <rect x="748" y="240" width="26" height="58" rx="5" fill="url(#barGrad1)" opacity="0.7"/>
  <!-- Bar 3 - 50% -->
  <rect x="784" y="253" width="26" height="45" rx="5" fill="url(#barGrad1)" opacity="0.6"/>
  <!-- Bar 4 - 90% (tallest) -->
  <rect x="820" y="217" width="26" height="81" rx="5" fill="url(#barGrad1)" opacity="1"/>
  <!-- Bar 5 - 55% -->
  <rect x="856" y="249" width="26" height="49" rx="5" fill="url(#barGrad1)" opacity="0.65"/>
  <!-- Bar 6 - 75% (cyan) -->
  <rect x="892" y="231" width="26" height="67" rx="5" fill="url(#barGrad2)" opacity="0.8"/>
  <!-- Bar 7 - 45% -->
  <rect x="928" y="257" width="26" height="41" rx="5" fill="url(#barGrad1)" opacity="0.5"/>

  <!-- Transaction 1: Groceries -->
  <rect x="700" y="316" width="272" height="52" rx="12" fill="rgba(255,255,255,0.04)"/>
  <circle cx="726" cy="342" r="16" fill="rgba(239,68,68,0.15)"/>
  <text x="726" y="347" font-family="Arial" font-size="13" fill="#f87171" text-anchor="middle">🛒</text>
  <text x="752" y="337" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#f1f5f9">Groceries</text>
  <text x="752" y="354" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Today</text>
  <text x="960" y="345" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#f87171" text-anchor="end">-$42.50</text>

  <!-- Transaction 2: Salary -->
  <rect x="700" y="376" width="272" height="52" rx="12" fill="rgba(255,255,255,0.04)"/>
  <circle cx="726" cy="402" r="16" fill="rgba(74,222,128,0.15)"/>
  <text x="726" y="407" font-family="Arial" font-size="13" fill="#4ade80" text-anchor="middle">💰</text>
  <text x="752" y="397" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#f1f5f9">Salary</text>
  <text x="752" y="414" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Feb 22</text>
  <text x="960" y="405" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#4ade80" text-anchor="end">+$3,200</text>

  <!-- Transaction 3: Transport -->
  <rect x="700" y="436" width="272" height="52" rx="12" fill="rgba(255,255,255,0.04)"/>
  <circle cx="726" cy="462" r="16" fill="rgba(251,146,60,0.15)"/>
  <text x="726" y="467" font-family="Arial" font-size="13" fill="#fb923c" text-anchor="middle">🚗</text>
  <text x="752" y="457" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#f1f5f9">Transport</text>
  <text x="752" y="474" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Feb 21</text>
  <text x="960" y="465" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#f87171" text-anchor="end">-$18.00</text>

  <!-- Bottom URL bar on phone -->
  <rect x="700" y="500" width="272" height="32" rx="10" fill="rgba(99,102,241,0.15)"/>
  <text x="836" y="521" font-family="Arial, sans-serif" font-size="12" fill="#818cf8" text-anchor="middle">flowllet.syscomatic.com</text>
</svg>
